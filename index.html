        <!-- Project One -->
        <a class="project-item" target="_blank">
          <figure class="project-figure">
            <div class="project-overlay"></div>
            <img src="Assets/2monkeys.png">
            <figcaption class="project-text">
              <h2>2Monkeys</h2>
              <p>Two-player game</p>
              <p class='hidden popUpdesc'> 2MONKEYS is a two-player game for the web. Based on the basics of HTML,
                JavaScript and CSS.
              </p>
            </figcaption>
          </figure>
        </a>

        <!-- Project Two -->
        <a class="project-item" target="_blank">
          <figure class="project-figure">
            <div class="project-overlay"></div>
            <img src="Assets/rædda.png">
            <figcaption class="project-text">
              <h2>Rædda</h2>
              <p>First aid assistance</p>
              <p class='hidden popUpdesc'> Rædda is a small key fob that ensures compliance with the rescue chain in an
                accident scenario and supports the first responder in the rescue.
                Thanks to its live transmission, rædda can give the rescue control center an initial overview of the
                accident scene and the victim.
                The dispatcher at the control center can thus guide the first responder in a targeted manner to ensure
                that everything goes smoothly.
                Health data can be uploaded to rædda via the associated application.
              </p>
            </figcaption>
          </figure>
        </a>

        <!-- Project Three -->
        <a class="project-item" target="_blank">
          <figure class="project-figure">
            <div class="project-overlay"></div>
            <img src="Assets/Ocean.png">
            <figcaption class="project-text">
              <h2>Ocean</h2>
              <p>Collaboration tool</p>
              <p class='hidden popUpdesc'> Redesign of Microsoft Teams. The goal was to focus on the essentials like
                chat, calls and scheduling.
                The reason for this was the many options that are not yet fully developed.
                We fixed and improved the previous problems like confusion, bad usability of some functions, and
                overload
                of the application (Microsoft Teams) in our redesign.
              </p>
            </figcaption>
          </figure>
        </a>

        <!-- Project Four -->
        <a class="project-item" target="_blank">
          <figure class="project-figure">
            <div class="project-overlay"></div>
            <img src="Assets/Senseforplants.png">
            <figcaption class="project-text">
              <h2>Sense for plants</h2>
              <p>Plant application</p>
              <p class='hidden popUpdesc'>Sense for plants, an application for controlling plants with IoT sensors.
                The user can add plants from a database and connect them to a sensor.
                The sensor measures the humidity and displays the data in the overview.
                It is also possible to add new plants in the overview, adjust the watering times, or water the plants
                directly.
              </p>
            </figcaption>
          </figure>
        </a>

        <!-- Project Five -->
        <a class="project-item" target="_blank">
          <figure class="project-figure">
            <div class="project-overlay"></div>
            <img src="Assets/Aldoo.png">
            <figcaption class="project-text">
              <h2>Aldoo</h2>
              <p>Logistic support</p>
              <p class='hidden popUpdesc'>A big problem for small and medium enterprises is warehousing and logistics.
                Transportation costs cause 2/3 of the expenses. So the challenge was to develop an efficient and at the
                same time cost-effective solution with high reliability. We developed our solution together with the
                logisticians of a local bakery. The final product is a mobile application that is networked with the
                transport baskets and supports the
                driver.
              </p>
            </figcaption>
          </figure>
        </a>

        <!-- Project Four -->
        <a class="project-item" target="_blank">

            <img src="Assets/FIS.png">
            <figcaption class="project-text">

              <p class='hidden popUpdesc'>This project involved developing a concept and design for an in-flight
                entertainment system for a fictitious airline.
              </p>
            </figcaption>
          </figure>
        </a>
